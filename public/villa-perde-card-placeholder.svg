<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Villa perde modelleri görsel alanı</title>
  <desc id="desc">Villa projesine ait onaylı fotoğraf eklenene kadar kullanılan sade yer tutucu.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#282828"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8d8172" stop-opacity=".55"/>
      <stop offset=".5" stop-color="#d4c8b8" stop-opacity=".75"/>
      <stop offset="1" stop-color="#74695d" stop-opacity=".5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <rect x="260" y="220" width="680" height="980" rx="8" fill="#171717" stroke="#65605a" stroke-width="4"/>
  <path d="M280 230c120 210 70 700 10 950h265V230zM920 230c-120 210-70 700-10 950H645V230z" fill="url(#curtain)"/>
  <rect x="556" y="230" width="88" height="950" fill="#b7c5ca" fill-opacity=".18"/>
  <path d="M170 1280h860M245 1350h710" stroke="#7b746c" stroke-width="3" opacity=".55"/>
  <text x="600" y="1450" text-anchor="middle" fill="#d8d2ca" font-family="Arial, sans-serif" font-size="34" letter-spacing="8">VİLLA PERDE</text>
  <text x="600" y="1505" text-anchor="middle" fill="#918b84" font-family="Arial, sans-serif" font-size="20" letter-spacing="3">PROJE GÖRSELİ BEKLENİYOR</text>
</svg>
